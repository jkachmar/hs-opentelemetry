_common/lib: !include "../package-common.yaml"

name:                hs-opentelemetry-api
version:             0.3.0.0

<<: *preface

extra-source-files:
- README.md
- ChangeLog.md

synopsis:            OpenTelemetry API for use by libraries for direct instrumentation or wrapper packages.
category:            OpenTelemetry, Telemetry, Monitoring, Observability, Metrics

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/iand675/hs-opentelemetry/tree/main/api#readme>

default-extensions:
- OverloadedStrings
- RecordWildCards

dependencies:
- base >= 4.7 && < 5
- mtl ^>= 2
- text ^>= 2
- unliftio-core ^>= 0.2
- unordered-containers ^>= 0.2
- vector ^>= 0.13
- vector-builder ^>= 0.3

library:
  source-dirs: src
  ghc-options: -Wall
  dependencies:
  - async ^>= 2
  - attoparsec ^>= 0.1
  - binary >= 4.7 && < 5
  - bytestring ^>= 0.12
  - charset ^>= 0.3
  - clock ^>= 0.8
  - hashable ^>= 1.5
  - http-types ^>= 0.12
  - memory ^>= 0.18
  - regex-tdfa ^>= 1.3
  - safe-exceptions ^>= 0.1
  - template-haskell ^>= 2.21 || ^>= 2.22 || ^>= 2.23 || ^>= 2.24
  - thread-utils-context ^>= 0.3
  - transformers ^>= 0.6
  - vault ^>= 0.3
  other-modules:
  - OpenTelemetry.Context.Types
  - OpenTelemetry.Internal.Trace.Types
  - Paths_hs_opentelemetry_api

tests:
  hs-opentelemetry-api-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    # package under test
    - hs-opentelemetry-api
    # external dependencies
    - hspec ^>= 2.11
