_common/lib: !include "../../package-common.yaml"

name:                hs-opentelemetry-instrumentation-persistent
version:             0.1.0.1

<<: *preface

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/iand675/hs-opentelemetry/tree/main/instrumentation/persistent#readme>

dependencies:
- base >= 4.7 && < 5

library:
  # ghc-options: -Wall
  source-dirs: src
  dependencies:
  # instrumented library
  - persistent >= 2.13.3
  # opentelemetry dependencies
  - hs-opentelemetry-api ^>= 0.3
  # external dependencies
  - clock ^>= 0.8
  - mtl ^>= 2
  - resourcet ^>= 1.2 || ^>= 1.3
  - text ^>= 2
  - unliftio ^>= 0.2 # TODO, unliftio-core
  - unordered-containers ^>= 0.2
  - vault ^>= 0.3

# Test suite not yet implemented
_tests:
  hs-opentelemetry-persistent-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    # package under test
    - hs-opentelemetry-instrumentation-persistent
