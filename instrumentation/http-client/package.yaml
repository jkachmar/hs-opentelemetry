_common/lib: !include "../../package-common.yaml"

name:                hs-opentelemetry-instrumentation-http-client
version:             0.1.0.1

<<: *preface

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/iand675/hs-opentelemetry/tree/main/instrumentation/http-client#readme>

dependencies:
- base >= 4.7 && < 5

library:
  ghc-options: -Wall
  source-dirs: src
  dependencies:
  # instrumented libraries
  - http-client ^>= 0.7
  - http-conduit ^>= 2.2
  # opentelemetry dependencies
  - hs-opentelemetry-api ^>= 0.3
  - hs-opentelemetry-instrumentation-conduit >= 0.0.1 && < 0.2
  # external dependencies
  - aeson
  - bytestring ^>= 0.12
  - case-insensitive ^>= 1.2
  - conduit ^>= 1.2
  - http-types ^>= 0.12
  - text ^>= 2
  - unliftio ^>= 0.2 # todo: unliftio-core
  - unordered-containers ^>= 0.2

# Test suite not yet implemented
_tests:
  hs-opentelemetry-instrumentation-http-client-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    # package under test
    - hs-opentelemetry-instrumentation-http-client
