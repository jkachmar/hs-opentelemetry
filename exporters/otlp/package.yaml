name:                hs-opentelemetry-exporter-otlp
version:             0.1.0.1
github:              "iand675/hs-opentelemetry"
license:             BSD3
author:              "Ian Duncan"
maintainer:          "ian@iankduncan.com"
copyright:           "2021 Ian Duncan"

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
synopsis:            OpenTelemetry exporter supporting the standard OTLP protocol
category:            OpenTelemetry, Telemetry, Monitoring, Observability, Metrics

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description:         Please see the README on GitHub at <https://github.com/iand675/hs-opentelemetry/tree/main/exporters/otlp#readme>

dependencies:
- base >= 4.7 && < 5

library:
  ghc-options: -Wall
  source-dirs: src
  dependencies:
  # opentelemetry dependencies
  - hs-opentelemetry-api ^>= 0.3
  - hs-opentelemetry-otlp ^>= 0.1
  - hs-opentelemetry-propagator-w3c
  # external dependencies
  - bytestring ^>= 0.12
  - case-insensitive ^>= 1.2
  - http-client
  - http-conduit
  - http-types ^>= 0.12
  - microlens
  - proto-lens >= 0.7.1.0
  - text ^>= 2
  - unordered-containers ^>= 0.2
  - vector ^>= 0.13
  - zlib ^>= 0.6 || ^>= 0.7

# Test suite not yet implemented
_tests:
  hs-opentelemetry-exporter-otlp-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    # package under test
    - hs-opentelemetry-exporter-otlp
